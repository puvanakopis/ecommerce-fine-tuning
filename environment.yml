name: ecommerce-llm-finetuning
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  - pandas=2.2.2
  - numpy=1.26.4
  - matplotlib=3.9.0
  - seaborn=0.13.2
  - scikit-learn=1.5.0
  - pip:
      - wordcloud==1.9.3
      - datasets==2.20.0
      - transformers==4.42.4
      - tokenizers==0.19.1
      - accelerate==0.32.1
      - peft==0.11.1
      - trl==0.9.6
      - bitsandbytes==0.43.1
      - sentencepiece==0.2.0
      - huggingface_hub==0.24.0
      - safetensors==0.4.3
      - unsloth @ git+https://github.com/unslothai/unsloth.git
      - evaluate==0.4.2
      - rouge_score==0.1.2
      - nltk==3.8.1
      - sacrebleu==2.4.2
      - streamlit==1.36.0
      - pypdf==4.2.0
      - tqdm==4.66.4
      - python-dotenv==1.0.1
      - pyyaml==6.0.1

# NOTE: bitsandbytes/unsloth require a CUDA-capable GPU + matching NVIDIA
# drivers. For local (non-Colab) setup, install the `pytorch` and
# `pytorch-cuda` conda packages matching your CUDA version first, e.g.:
#   conda install pytorch pytorch-cuda=12.1 -c pytorch -c nvidia
# then: conda env create -f environment.yml
